# Planck-style keyboard, MX-spaced, 4x12 grid
# Bottom row: 1u, 1u, 1u, 1.5u, 1.5u, 1.5u, 1.5u, 1u, 1u, 1u (10 keys = 12u)
# Top-right key removed for EC11 rotary encoder knob
# Per-key RGB (SK6812mini-e), nRF52840 SuperMini MCU, battery connector, power switch, reset switch
#
# Uses ceoloide footprints for MCU/RGB/diode/rotary/power/reset/battery
# and ergogen built-in mx for MX-spaced switches

meta:
  author: Unknown
  version: v1.0.0

units:
  # MX spacing is 19.05mm (1U)
  # u = 19 (ergogen default, used for key unit sizes)
  # U = 19.05 (precise MX spacing, used for column spread/padding)

points:
  key:
    padding: -U
    spread: U
  zones:
    matrix:
      anchor:
        shift: [50, -42.85]
      columns:
        one:
          key:
            pin: P1
          rows:
            top:
            home:
            bottom:
        two:
          key:
            pin: P0
          rows:
            top:
            home:
            bottom:
        three:
          key:
            pin: P14
          rows:
            top:
            home:
            bottom:
        four:
          key:
            pin: P20
          rows:
            top:
            home:
            bottom:
        five:
          key:
            pin: P2
          rows:
            top:
            home:
            bottom:
        six:
          key:
            pin: P3
          rows:
            top:
            home:
            bottom:
        seven:
          key:
            pin: P4
          rows:
            top:
            home:
            bottom:
        eight:
          key:
            pin: P5
          rows:
            top:
            home:
            bottom:
        nine:
          key:
            pin: P6
          rows:
            top:
            home:
            bottom:
        ten:
          key:
            pin: P7
          rows:
            top:
            home:
            bottom:
        eleven:
          key:
            pin: P8
          rows:
            top:
            home:
            bottom:
        twelve:
          key:
            pin: P9
          rows:
            top:
            home:
            bottom:
    modrow:
      anchor:
        ref: matrix_one_bottom
        shift: [0, -U]
      columns:
        one:
          key:
            spread: U
            pin: P1
          rows:
            mod:
        two:
          key:
            spread: U
            pin: P0
          rows:
            mod:
        three:
          key:
            spread: U
            pin: P14
          rows:
            mod:
        four:
          key:
            spread: 1.5U
            pin: P20
          rows:
            mod:
        five:
          key:
            spread: 1.5U
            pin: P2
          rows:
            mod:
        eight:
          key:
            spread: 1.5U
            pin: P5
          rows:
            mod:
        nine:
          key:
            spread: 1.5U
            pin: P6
          rows:
            mod:
        ten:
          key:
            spread: U
            pin: P7
          rows:
            mod:
        eleven:
          key:
            spread: U
            pin: P8
          rows:
            mod:
        twelve:
          key:
            spread: U
            pin: P9
          rows:
            mod:

outlines:
  bounds:
    - what: rectangle
      where: -matrix_twelve_top
      size: [18.5, 18.5]
      bound: true
  panel:
    - what: outline
      name: bounds
      expand: 0.5
    - what: circle
      where:
        ref: matrix_twelve_home
        shift: [0, U]
      radius: 9.25
    - what: outline
      name: panel
      fillet: 2.5

pcbs:
  main:
    template: kicad8
    outlines:
      main:
        outline: panel
    footprints:

      # === SWITCHES (ergogen built-in MX footprint) ===
      # Column net = MCU pin (P1, P0, P14, P20, P2, P3, P4, P5, P6, P7, P8, P9)
      # Row net = col_name_row_name (one_top, one_home, etc.) — unique per switch
      switches:
        what: mx
        where: -matrix_twelve_top
        params:
          from: "{{pin}}"
          to: "{{colrow}}"
          keycaps: true

      # === DIODES (ceoloide THT SOD-123) ===
      diodes:
        what: ceoloide/diode_tht_sod123
        where: -matrix_twelve_top
        adjust:
          shift: [0, 9.5]
        params:
          from: "{{colrow}}"
          to: "{{pin}}"
          side: B
          include_tht: true

      # === PER-KEY RGB LEDs (ceoloide SK6812mini-e, snake chain) ===
      # 45 LEDs (top-right key removed for rotary encoder)
      led_1:
        what: ceoloide/led_sk6812mini-e
        where: matrix_one_top
        adjust:
          shift: [0, 5]
        params:
          P2: LED_1
          P4: LED_DIN
      led_2:
        what: ceoloide/led_sk6812mini-e
        where: matrix_one_home
        adjust:
          shift: [0, 5]
        params:
          P2: LED_2
          P4: LED_1
      led_3:
        what: ceoloide/led_sk6812mini-e
        where: matrix_one_bottom
        adjust:
          shift: [0, 5]
        params:
          P2: LED_3
          P4: LED_2
      led_4:
