          P4: LED_44

      # === MCU (ceoloide nRF52840 SuperMini) ===
      mcu:
        what: ceoloide/mcu_supermini_nrf52840
        where:
          ref: matrix_two_home
          shift: [0, 11.525]
        params:
          side: F
          reverse_mount: false
          include_extra_pins: false
          P1: P1
          P0: P0
          P14: P14
          P20: P20
          P2: P2
          P3: P3
          P4: P4
          P5: P5
          P6: P6
          P7: P7
          P8: P8
          P9: P9
          P10: P10
          P15: P15
          P16: P16
          P18: P18
          P19: P19
          P21: P21

      # === ROTARY ENCODER (ceoloide EC11/EC12) — top-right corner ===
      rotary:
        what: ceoloide/rotary_encoder_ec11_ec12
        where:
          ref: matrix_twelve_home
          shift: [0, U]
        params:
          side: F
          A: P13
          B: P12
          C: GND
          S1: P10
          S2: GND

      # === POWER SWITCH (ceoloide SMD side switch) ===
      power:
        what: ceoloide/power_switch_smd_side
        where:
          ref: matrix_three_top
          shift: [9.525, 7.5]
          rotate: 90
        params:
          side: F
          from: BAT_P
          to: RAW

      # === RESET SWITCH (ceoloide THT top switch) ===
      reset:
        what: ceoloide/reset_switch_tht_top
        where:
          ref: matrix_three_home
          shift: [9.525, 9.525]
        params:
          side: F
          from: GND
          to: RST

      # === BATTERY CONNECTOR (ceoloide JST-PH 2-pin) ===
      battery:
        what: ceoloide/battery_connector_jst_ph_2
        where:
          ref: matrix_four_home
          shift: [9.525, 9.525]
          rotate: 90
        params:
          side: F
          BAT_P: BAT_P
          BAT_N: GND
